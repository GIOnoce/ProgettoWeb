<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.1/xlsx.full.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
  <header>
    <div class="text-container">
      <h1>Gestione Ombrelloni</h1>
      <p>Amministrazione affitti e tariffe</p>
    </div>
    <img class="logo" src="logo.jpg" alt="Logo">
  </header>
    <div class="container">
      <aside class="left">
        <h2>Filtra Ricerca</h2>
        <form id="filtroForm">
          <!-- Filtri per gli Ombrelloni -->
          <label>Settore:
            <select name="settore">
              <option value="">Seleziona Settore</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
            </select>
          </label><br />
      
          <label>Fila:
            <input type="number" name="fila" min="1" max="10" placeholder="Cerca Fila (1-10)" />
          </label><br />
      
          <label>Posto Fila:
            <input type="number" name="postoFila" min="1" max="100" placeholder="Cerca Posto Fila (1-100)" />
          </label><br />
      
          <label>Tipologia:
            <select name="tipologia">
              <option value="">Tutte</option>
              <option value="Standard">Standard</option>
              <option value="Family">Family</option>
              <option value="Luxury">Luxury</option>
            </select>
          </label><br />
      
          <!-- Filtri per i Contratti -->
          <label>Numero Contratto:
            <input type="text" name="numeroContratto" placeholder="Cerca Contratto" />
          </label><br />
      
          <label>Data Contratto:
            <input type="date" name="dataContratto" />
          </label><br />
      
          <label>Giorni Contratto (separati da virgola):
            <input type="text" name="giorniContratto" placeholder="Es. lunedi, sabato" />
          </label><br />
      
          <!-- Filtri per le Tariffe -->
      
          <label>Tipo Tariffa:
            <select name="tipoTariffa">
              <option value="">Tutti</option>
              <option value="Giornaliera">Giornaliera</option>
              <option value="Abbonamento">Abbonamento</option>
            </select>
          </label><br />

          <!-- Filtri per i Clienti -->
      
          <label>Cognome Cliente:
            <input type="text" name="cognomeCliente" placeholder="Cerca Cognome Cliente" />
          </label><br />
      
          <label>Data Nascita Cliente:
            <input type="date" name="dataNascitaCliente" />
          </label><br />

          <!-- Pulsante per attivare la ricerca -->
          <button type="submit">Cerca</button>
        </form>
      </aside>
      
      <main>
        <h2>Risultati</h2>
        <div id="dinamicView" class="dinamic-view">
          <div id="risultati" class="scroll-container">
            <!-- I contratti o contenuti verranno inseriti qui -->
          </div>
        </div>
      </main>
      <aside class="right">
        <h2>Navigazione</h2>
        <ul>
          <li><button onclick="mostraForm('aggiungiContratto')"><i class="fas fa-plus-circle"></i> Aggiungi Contratto</button></li>
          <hr />
          <li><button onclick="mostraLista('contratti')"><i class="fas fa-scroll"></i> Contratti</button></li>
          <li><button onclick="mostraLista('ombrelloni')"><i class="fas fa-umbrella-beach"></i> Prenotazioni Ombrelloni</button></li>
        <li><button onclick="mostraLista('tipologie')"><i class="fas fa-file-alt"></i> Tipologie Ombrelloni</button></li>
        <li><button onclick="mostraLista('tipologiatariffa')"><i class="fas fa-file-alt"></i> Tipologie Tariffe</button></li>
        <li><button onclick="mostraLista('guida')"><i class="fas fa-umbrella-beach"></i> Guida</button></li>
        
        </ul>
      </aside>
    </div>
    <footer>
      <p>&copy; 2025 - Progetto Universitario - Gestione Ombrelloni</p>
      <div>
        <a href="#">Facebook</a> | 
        <a href="#">Instagram</a> |
        <a href="#">LinkedIn</a>
      </div>
    </footer>


  <script src="app.js"></script>
</body>
</html>
