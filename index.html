<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.1/xlsx.full.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
  <header>
    <div class="text-container">
      <h1>Gestione Ombrelloni</h1>
      <p>Amministrazione affitti e tariffe</p>
    </div>
    <img class="logo" src="logo.jpg" alt="Logo">
  </header>
    <div class="container">
      <aside class="left">
        <h2>Filtra Ricerca</h2>

        <form id="filtroForm">
          <!-- Filtro per periodo -->
          <label>Data Inizio:
            <input type="date" name="dataInizio" />
          </label><br />
        
          <label>Data Fine:
            <input type="date" name="dataFine" />
          </label><br />
        
          <!-- Filtro per settore -->
          <label>Settore Spiaggia:
            <select name="settore">
              <option value="">Tutti</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
            </select>
          </label><br />
        
          <!-- Filtro per fila -->
          <label>Numero di Fila:
            <input type="number" name="fila" min="1" max="10" placeholder="Fila (1-10)" />
          </label><br />
        
          <!-- Filtro per tipologia -->
          <label>Tipologia Ombrellone:
            <select name="tipologia">
              <option value="">Tutte</option>
              <option value="Sdraio">Sdraio</option>
              <option value="Lettino">Lettino</option>
              <option value="Cabina Inclusa">Cabina Inclusa</option>
            </select>
          </label><br />
        
          <!-- Filtro per tipo tariffa -->
          <label>Tipo di Tariffa:
            <select name="tipoTariffa" id="tipoTariffa">
              <option value="">Tutti</option>
              <option value="Giornaliera">Giornaliera</option>
              <option value="Abbonamento">Abbonamento</option>
            </select>
          </label><br />
        
          <!-- Filtro per numero minimo giorni (solo se abbonamento) -->
          <label id="labelMinGiorni" style="display: none;">Numero Minimo Giorni:
            <input type="number" name="numMinGiorni" id="numMinGiorni" min="1" placeholder="Solo per Abbonamenti" />
          </label><br />
        
          <!-- Filtro per prezzo -->
          <label>Prezzo Minimo:
            <input type="number" name="prezzoMin" min="0" step="0.01" placeholder="€" />
          </label><br />
        
          <label>Prezzo Massimo:
            <input type="number" name="prezzoMax" min="0" step="0.01" placeholder="€" />
          </label><br />
        
          <!-- Pulsante per cercare -->
          <button type="submit">🔍 Cerca</button>
        </form>
        
        
               
        
      </aside>
      
      <main>
        <h2>Risultati</h2>
        <div id="dinamicView" class="dinamic-view">
          <div id="risultati" class="scroll-container">
            <!-- I contratti o contenuti verranno inseriti qui -->
          </div>
        </div>
      </main>
      <aside class="right">
        <h2>Navigazione</h2>
        <ul>
          <li><button onclick="mostraForm('aggiungiContratto')"><i class="fas fa-plus-circle"></i> Aggiungi Contratto</button></li>
          <hr />
          <li><button onclick="mostraLista('contratti')"><i class="fas fa-scroll"></i> Contratti</button></li>
          <li><button onclick="mostraLista('ombrelloni')"><i class="fas fa-umbrella-beach"></i> Prenotazioni Ombrelloni</button></li>
        <li><button onclick="mostraLista('tipologie')"><i class="fas fa-file-alt"></i> Tipologie Ombrelloni</button></li>
        <li><button onclick="mostraLista('tipologiatariffa')"><i class="fas fa-file-alt"></i> Tipologie Tariffe</button></li>
        <li><button onclick="mostraLista('guida')"><i class="fas fa-umbrella-beach"></i> Guida</button></li>
        
        </ul>
      </aside>
    </div>
    <footer>
      <p>&copy; 2025 - Progetto Universitario - Gestione Ombrelloni</p>
      <div>
        <a href="#">Facebook</a> | 
        <a href="#">Instagram</a> |
        <a href="#">LinkedIn</a>
      </div>
    </footer>


  <script src="app.js"></script>
</body>
</html>
