<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ombrelloni</title>
    <link rel="stylesheet" href="stile_ombrelloni.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.1/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  </head>
  <body>
    <header>
      <div class="text-container">
        <h1>Gestione Ombrelloni</h1>
        <p>Amministrazione affitti e tariffe</p>
      </div>
      <img class="logo" src="logo.jpg" alt="Logo">
    </header>
      <div class="container">
        <aside class="left">
          <h2>Filtra Ricerca</h2>
<form id="filtroForm">

  <!-- Filtro per data (contratto o disponibilità) -->
  <label>Data Inizio:
    <input type="date" name="dataInizio" />
  </label>

  <!-- Filtro per ombrellone -->
  <div class="settore-fila-row">
    <label class="half">
      Settore:
      <select name="settore">
        <option value="">Tutti</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
    </label>

    <label class="half">
      Fila:
      <input type="number" name="fila" min="1" max="10" placeholder="Es. 3" />
    </label>
  </div>

  <!-- Filtro per tipologia -->
  <label>Tipologia:
    <select name="tipologia">
      <option value="">Tutte</option>
      <option value="T1">Lettino</option>
      <option value="T2">Sdraio</option>
      <option value="T3">Cabina Inclusa</option>
    </select>
  </label>

  <!-- Filtro per tipo tariffa -->
  <label>Tipo Tariffa:
    <select name="tipoTariffa" id="tipoTariffa">
      <option value="">Tutte</option>
      <option value="Giornaliera">Giornaliera</option>
      <option value="Abbonamento">Abbonamento</option>
    </select>
  </label>

  <!-- Filtro per minimo giorni solo per abbonamenti -->
  <label id="labelMinGiorni" style="display: none;">Minimo Giorni:
    <input type="number" name="minGiorni" id="minGiorni" min="1" placeholder="Es. 3" />
  </label>

  <button type="submit">🔍 Cerca</button>
</form>
          
        </aside>
        
        <main>
          <h2>Risultati</h2>
          <div id="dinamicView" class="dinamic-view">
            <div id="risultati" class="scroll-container">
              <!-- I contratti o contenuti verranno inseriti qui -->
            </div>
          </div>
        </main>
        <aside class="right">
          <h2>Navigazione</h2>
          <ul>
            <li><a href="home.html"><button class="active-button">HOME</button></a></li>
            <li><a href="contratti.html?view=contratti"><button><i class="fas fa-scroll"></i>Contratti</button></a></li>
            <li><a href="ombrelloni.html?view=ombrelloni"><button><i class="fas fa-umbrella-beach"></i>Ombrelloni</button></a></li>
            <hr />
            <li><button onclick="mostraForm('aggiungiContratto')"><i class="fas fa-plus-circle"></i> Aggiungi Contratto</button></li>          
            <hr />
          </ul>
        </aside>
      </div>
      <footer>
        <p>&copy; 2025 - Progetto Universitario - Gestione Ombrelloni</p>
        <div>
          <a href="#">Facebook</a> | 
          <a href="#">Instagram</a> |
          <a href="#">LinkedIn</a>
        </div>
      </footer>
  
  
    <script src="app.js"></script>
  </body>
  </html>
